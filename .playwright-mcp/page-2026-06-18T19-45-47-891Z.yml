  - main [ref=e25]:
    - generic [ref=e28]:
      - heading "О компании" [level=1] [ref=e29]
      - paragraph [ref=e30]: Не просто доставка — связь регионов. Для гигантов и тех, кто ими становится.
    - generic [ref=e33]:
      - generic [ref=e34]:
        - paragraph [ref=e35]: ООО «РемСтройПроект» специализируется на организации перевозок в одном из самых сложных регионов — на Крайнем Севере.
        - paragraph [ref=e36]: Наш опыт перевозок позволяет гарантировать безопасность и своевременность доставки любых грузов вне зависимости от их сложности, качественно и в срок для эффективности работы нефтегазодобывающих предприятий через обеспечение чётким и отлично налаженным транспортным обслуживанием.
        - paragraph [ref=e37]: ООО «РемСтройПроект» сформировало производственный процесс транспортного обслуживания и минимизировало непроизводительное эксплуатирование транспортных средств, трудовых ресурсов, их простои. Поэтому мы снижаем затратоёмкость и капиталоёмкость транспортного обслуживания добывающего предприятия, учитывая, что технологические процессы нефтегазодобычи носят непрерывный характер.
        - paragraph [ref=e38]: Наша компания обеспечивает важную функцию — доставку к месту выполнения работ различных видов грузов. Именно поэтому на первый план выступает система гарантированного обеспечения нефтегазовых предприятий технологическим транспортом в определённой номенклатуре и в заданном количестве.
