services:
  rsp96:
    image: rsp96:latest
    container_name: rsp96
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - rsp96-data:/app/data
      - rsp96-uploads:/app/public/images/uploads
    networks:
      - rsp96_default
      - safescan_net
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Переопределите хеш пароля админа при необходимости
      # - ADMIN_PASSWORD_HASH=...

volumes:
  rsp96-data:
  rsp96-uploads:

networks:
  rsp96_default:
  safescan_net:
    external: true
    name: safescan_safescan_net
